name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Secrets required (set in repo Settings → Secrets):
#   APPLE_ID             — your Apple ID email
#   APPLE_TEAM_ID        — 10-char team ID from developer.apple.com
#   APPLE_APP_PASSWORD   — app-specific password from appleid.apple.com
#   APPLE_CERT_BASE64    — base64-encoded .p12 Developer ID certificate
#   APPLE_CERT_PASSWORD  — password for the .p12
#
# For internal/ad-hoc distribution (no notarization), only GITHUB_TOKEN is needed.

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (M1) — produces universal2 without Rosetta
    permissions:
      contents: write   # needed to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13 (python.org fat binary for universal2)
        # Must use python.org installer (not Homebrew) to get a fat arm64+x86_64
        # Python — required for PyInstaller universal2 builds.
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          # actions/setup-python on macos-14 installs the python.org universal2 build

      - name: Install Python dependencies
        run: |
          pip install -e ".[build]"
          pip install pyinstaller pillow

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate app icon
        run: python3 packaging/assets/make_icns.py

      # ── Codesign certificate (only when secrets are available) ──────────────
      - name: Import Developer ID certificate
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Build .app with PyInstaller (universal2)
        env:
          CLAUDE_BAR_UNIVERSAL2: "1"
        run: |
          pyinstaller packaging/claude-usage-bar.spec \
            --distpath dist \
            --workpath build \
            --noconfirm

      - name: Codesign .app
        env:
          IDENTITY: ${{ secrets.APPLE_CERT_BASE64 != '' && 'Developer ID Application' || '-' }}
        run: |
          codesign \
            --force --deep \
            --options runtime \
            --entitlements packaging/entitlements.plist \
            --sign "$IDENTITY" \
            "dist/Claude Usage Bar.app"
          codesign --verify --deep --strict "dist/Claude Usage Bar.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Claude Usage Bar ${{ steps.version.outputs.version }}" \
            --window-size 540 380 \
            --icon-size 128 \
            --icon "Claude Usage Bar.app" 135 190 \
            --hide-extension "Claude Usage Bar.app" \
            --app-drop-link 405 190 \
            "dist/claude-usage-bar-${{ steps.version.outputs.version }}.dmg" \
            "dist/Claude Usage Bar.app"

      # Codesign the DMG itself (required for notarization)
      - name: Codesign DMG
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        env:
          IDENTITY: "Developer ID Application"
        run: |
          codesign \
            --force \
            --options runtime \
            --sign "$IDENTITY" \
            "dist/claude-usage-bar-${{ steps.version.outputs.version }}.dmg"

      # ── Notarization (only when Apple credentials are available) ────────────
      - name: Notarize DMG
        if: ${{ secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit \
            "dist/claude-usage-bar-${{ steps.version.outputs.version }}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple \
            "dist/claude-usage-bar-${{ steps.version.outputs.version }}.dmg"
          xcrun stapler staple \
            "dist/Claude Usage Bar.app"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 \
            "dist/claude-usage-bar-${{ steps.version.outputs.version }}.dmg" \
            | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      # ── Update Homebrew formula in-place and commit back ───────────────────
      - name: Update Homebrew formula
        run: |
          V="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha256.outputs.sha256 }}"
          sed -i '' "s/version \"[^\"]*\"/version \"${V}\"/" packaging/homebrew/formula.rb
          sed -i '' "s/sha256 \"[^\"]*\"/sha256 \"${SHA}\"/" packaging/homebrew/formula.rb
          # Update the download URL to use the new version
          sed -i '' \
            "s|releases/download/v[^/]*/claude-usage-bar-[^.]*\.dmg|releases/download/v${V}/claude-usage-bar-${V}.dmg|" \
            packaging/homebrew/formula.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/homebrew/formula.rb
          git commit -m "chore: update homebrew formula to v${V} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude Usage Bar v${{ steps.version.outputs.version }}"
          body: |
            ## Install

            **Homebrew (recommended):**
            ```bash
            brew tap your-org/tools
            brew install --cask claude-usage-bar
            ```

            **Direct download:**
            Download the `.dmg` below, open it, drag to Applications.

            **pipx (developers):**
            ```bash
            pipx install claude-usage-bar
            claude-usage-bar install
            ```

            ## SHA256
            `${{ steps.sha256.outputs.sha256 }}`
          files: |
            dist/claude-usage-bar-${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
